<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Especial 💖</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
      overflow:hidden;
      padding:20px;
    }

    .container{
      background:white;
      padding:30px;
      border-radius:25px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      width:100%;
      max-width:420px;
      position:relative;
    }

    h1{
      color:#ff4f87;
      margin-bottom:20px;
      font-size:2rem;
    }

    p{
      color:#444;
      margin-bottom:30px;
      font-size:1.1rem;
      line-height:1.5;
    }

    .buttons{
      position:relative;
      width:100%;
      height:200px;
    }

    button{
      border:none;
      border-radius:18px;
      padding:12px 18px;
      font-size:1rem;
      cursor:pointer;
      position:absolute;
      transition:0.2s;

      display:flex;
      align-items:center;
      gap:10px;
    }

    button img{
      width:75px;
      height:75px;
      border-radius:15px;
      object-fit:cover;
    }

    #sim{
      background:#ff4f87;
      color:white;
      left:5%;
      top:20px;
    }

    #sim:hover{
      transform:scale(1.05);
    }

    #nao{
      background:#ececec;
      color:#333;
      left:58%;
      top:20px;
    }

    .foto-final{
      width:260px;
      max-width:85%;
      border-radius:20px;
      margin-top:20px;
      box-shadow:0 10px 20px rgba(0,0,0,0.2);
    }

    .heart{
      position:absolute;
      animation:subir 4s linear infinite;
      opacity:0.7;
      pointer-events:none;
      color:#ff4f87;
    }

    @keyframes subir{

      0%{
        transform:translateY(0);
        opacity:0;
      }

      50%{
        opacity:1;
      }

      100%{
        transform:translateY(-100vh);
        opacity:0;
      }

    }

    @media(max-width:600px){

      .container{
        padding:25px;
      }

      h1{
        font-size:1.6rem;
      }

      p{
        font-size:1rem;
      }

      button{
        font-size:0.9rem;
        padding:10px 14px;
      }

      button img{
        width:65px;
        height:65px;
      }

      #sim{
        left:0%;
      }

      #nao{
        left:55%;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>💌 Convite Especial 💌</h1>

    <p>
      helena fritas 💖 <br><br>
      vamos sair amanhã com muita alegria envolvida e zero depressao!!!
    </p>

    <div class="buttons">

      <!-- BOTÃO SIM -->
      <button id="sim">
        <img src="./sim.jpg">
        SIM 💖
      </button>

      <!-- BOTÃO NÃO -->
      <button id="nao">
        <img src="./nao.jpg">
        NÃO 😅
      </button>

    </div>

  </div>

  <script>

    const botaoNao =
      document.getElementById("nao");

    const botaoSim =
      document.getElementById("sim");

    // EMOJIS CHORANDO
    function criarRastro(x,y){

      const emojis =
        ["😭","💔","😫","💀","😭"];

      const rastro =
        document.createElement("div");

      rastro.innerHTML =
        emojis[Math.floor(Math.random()*emojis.length)];

      rastro.style.position = "absolute";
      rastro.style.left = x + "px";
      rastro.style.top = y + "px";
      rastro.style.fontSize = "30px";
      rastro.style.pointerEvents = "none";
      rastro.style.transition = "all 1s ease";
      rastro.style.opacity = "1";
      rastro.style.zIndex = "9999";

      document.body.appendChild(rastro);

      setTimeout(() => {

        rastro.style.transform =
          "translateY(-40px) rotate(20deg) scale(1.8)";

        rastro.style.opacity = "0";

      },10);

      setTimeout(() => {
        rastro.remove();
      },1000);

    }

    // BOTÃO NÃO FOGE
    ["mouseover","touchstart"].forEach(evento => {

      botaoNao.addEventListener(evento, () => {

        criarRastro(
          botaoNao.offsetLeft,
          botaoNao.offsetTop
        );

        const largura =
          window.innerWidth - 160;

        const altura =
          window.innerHeight - 100;

        const randomX =
          Math.random() * largura;

        const randomY =
          Math.random() * altura;

        botaoNao.style.left =
          `${randomX}px`;

        botaoNao.style.top =
          `${randomY}px`;

      });

    });

    // CLIQUE NO SIM
    botaoSim.addEventListener("click", () => {

      document.body.innerHTML = `

        <div style="
          min-height:100vh;
          width:100%;
          display:flex;
          justify-content:center;
          align-items:center;
          flex-direction:column;
          background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
          color:white;
          text-align:center;
          font-family:Arial;
          padding:20px;
        ">

          <h1 style="
            font-size:3rem;
            margin-bottom:15px;
          ">
     
          </h1>

          <p style="
            font-size:1.4rem;
            margin-bottom:15px;
          ">
            obrigada 
          </p>

          <img
            class="foto-final"
            src="./final.jpg"
          >

        </div>

      `;

      criarCoracoes();

    });

    // CORAÇÕES
    function criarCoracoes(){

      setInterval(() => {

        const heart =
          document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML = "💖";

        heart.style.left =
          Math.random() * 100 + "vw";

        heart.style.fontSize =
          (Math.random() * 30 + 20) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        },4000);

      },200);

    }

  </script>

</body>
</html>
