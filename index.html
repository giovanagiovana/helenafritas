
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Convite Especial 💖</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
      overflow:hidden;
      padding:20px;
    }

    .container{
      background:white;
      padding:30px;
      border-radius:25px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      position:relative;
      width:100%;
      max-width:420px;
    }

    h1{
      color:#ff4f87;
      margin-bottom:20px;
      font-size:2rem;
    }

    p{
      color:#444;
      margin-bottom:30px;
      font-size:1.1rem;
      line-height:1.5;
    }

    .buttons{
      position:relative;
      height:180px;
      width:100%;
    }

    button{
      border:none;
      padding:12px 18px;
      border-radius:18px;
      font-size:1rem;
      cursor:pointer;
      transition:0.2s;
      position:absolute;

      display:flex;
      align-items:center;
      gap:10px;
    }

    button img{
      width:55px;
      height:55px;
      border-radius:12px;
      object-fit:cover;
    }

    #sim{
      background:#ff4f87;
      color:white;
      left:8%;
      top:20px;
    }

    #sim:hover{
      transform:scale(1.05);
    }

    #nao{
      background:#e9e9e9;
      color:#333;
      left:58%;
      top:20px;
    }

    .heart{
      position:absolute;
      color:#ff4f87;
      animation:subir 4s linear infinite;
      opacity:0.7;
      pointer-events:none;
    }

    @keyframes subir{

      0%{
        transform:translateY(0);
        opacity:0;
      }

      50%{
        opacity:1;
      }

      100%{
        transform:translateY(-100vh);
        opacity:0;
      }
    }

    .foto-final{
      width:190px;
      max-width:80%;
      border-radius:20px;
      margin-top:20px;
      box-shadow:0 10px 20px rgba(0,0,0,0.2);
    }

    @media(max-width:600px){

      .container{
        padding:25px;
      }

      h1{
        font-size:1.6rem;
      }

      p{
        font-size:1rem;
      }

      button{
        font-size:0.95rem;
        padding:10px 16px;
      }

      button img{
        width:48px;
        height:48px;
      }

      #sim{
        left:2%;
      }

      #nao{
        left:56%;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>💌 Convite Especial 💌</h1>

    <p>
      oii helena fritas <br><br>
      vamos sair amanhã com muita alegria envolvida e zero depressao!!!
    </p>

    <div class="buttons">

      <!-- BOTÃO SIM -->
      <button id="sim">
        <img src="./sim.jpg">
        SIM 💖
      </button>

      <!-- BOTÃO NÃO -->
      <button id="nao">
        <img src="./nao.jpg">
        NÃO 😅
      </button>

    </div>

  </div>

  <script>

    const botaoNao = document.getElementById("nao");
    const botaoSim = document.getElementById("sim");

    // BOTÃO NÃO FOGE
    botaoNao.addEventListener("mouseover", () => {

      const largura =
        window.innerWidth - 160;

      const altura =
        window.innerHeight - 100;

      const randomX =
        Math.random() * largura;

      const randomY =
        Math.random() * altura;

      botaoNao.style.left =
        `${randomX}px`;

      botaoNao.style.top =
        `${randomY}px`;

    });

    // CLIQUE NO SIM
    botaoSim.addEventListener("click", () => {

      document.body.innerHTML = `

        <div style="
          min-height:100vh;
          width:100%;
          display:flex;
          justify-content:center;
          align-items:center;
          flex-direction:column;
          background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
          color:white;
          text-align:center;
          font-family:Arial;
          padding:20px;
        ">

          <h1 style="
            font-size:3rem;
            margin-bottom:15px;
          ">
     

          <p style="
            font-size:1.4rem;
            margin-bottom:15px;
          ">
            obrigada ❤️
          </p>

          <img
            class="foto-final"
            src="./final.jpg"
          >

        </div>

      `;

      criarCoracoes();

    });

    // CORAÇÕES
    function criarCoracoes(){

      setInterval(() => {

        const heart =
          document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML = "💖";

        heart.style.left =
          Math.random() * 100 + "vw";

        heart.style.fontSize =
          (Math.random() * 30 + 20) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 4000);

      }, 200);

    }

  </script>

</body>
</html>
